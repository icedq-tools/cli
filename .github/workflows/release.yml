name: Release

# Publishes @icedq/cli to npm when a GitHub Release is published.
# Authentication and provenance are handled automatically via npm Trusted
# Publishing (OIDC) — no NPM_TOKEN is used. The `release` environment gates
# every publish behind required reviewers (configured in repo settings).
#
# PREREQUISITES (one-time, on npmjs.com / GitHub — see SECURITY notes):
#   1. Register a Trusted Publisher for @icedq/cli: org icedq-tools, repo cli,
#      workflow release.yml, environment release.
#   2. Create the `release` GitHub Environment with required reviewers.
#   3. Set npm publishing access to "require 2FA and disallow tokens".

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # OIDC token for npm Trusted Publishing — publish job only
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm install -g npm@latest # Trusted Publishing requires npm >= 11.5.1
      - run: npm ci
      - run: npm test
      - run: npm publish # auth + provenance are automatic via Trusted Publishing
